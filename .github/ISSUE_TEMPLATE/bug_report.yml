name: Bug report
description: Report a reproducible problem using synthetic, redacted data.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include email content, account identifiers, OAuth tokens, keys, secrets, or private diagnostic bundles. Report security issues privately under SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior without private data.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps using synthetic data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - macOS
        - CLI
        - Core or build tooling
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed email content, account data, secrets, tokens, keys, and private diagnostics.
          required: true
