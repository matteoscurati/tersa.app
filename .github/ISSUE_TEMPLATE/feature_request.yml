name: Feature request
description: Propose an outcome that fits the current product boundaries.
title: "proposal: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user need, not private mailbox content. The MVP has no backend and does not promise reliable iOS push or guaranteed scheduling.
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Explain the problem using synthetic examples.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Privacy and product boundaries
      description: Explain storage, network, permissions, and platform implications.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I did not include email content, account data, secrets, tokens, keys, or private diagnostics.
          required: true
