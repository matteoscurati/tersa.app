    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Verify Xcode 26
        run: xcodebuild -version | grep -Fx 'Xcode 26.6'
      - name: Install notice generator
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-about@0.9.1
      - name: Fetch locked dependencies
        run: cargo fetch --locked
      - name: Check target-specific third-party notices
        run: sh apple/scripts/generate-third-party-notices.sh --check
      - name: Cross-build portable blob diagnostic for iOS
        run: |
          cargo build --locked --release --package tersa-blob-spike --target aarch64-apple-ios
          cargo build --locked --release --package tersa-blob-spike --target aarch64-apple-ios-sim
      - name: Verify crash-safe chunked-AEAD blob controls
        run: sh apple/scripts/verify-blob-feasibility.sh
      - name: Bind blob feasibility evidence to the source commit
        if: ${{ always() && hashFiles('apple/build/blob-evidence/result.txt') != '' }}
        run: python3 scripts/write-evidence-manifest.py apple/build/blob-evidence "$EVIDENCE_COMMIT_SHA"
      - name: Upload blob feasibility evidence
        if: ${{ always() && hashFiles('apple/build/blob-evidence/result.txt') != '' }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: crash-safe-aead-blob-feasibility-evidence
          path: apple/build/blob-evidence
          if-no-files-found: error
          retention-days: 90

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - name: Prepare verified rust-skia archive
        if: runner.os == 'macOS'
        run: |
          skia_url=$(sh apple/scripts/prepare-verified-skia.sh aarch64-apple-darwin)
          printf 'SKIA_BINARIES_URL=%s\n' "$skia_url" >> "$GITHUB_ENV"
      - name: Run baseline verification
        run: cargo run --locked --package xtask -- verify

  policy:
    name: Policy and supply chain
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - name: Verify M0 product gates
        run: |
          python3 scripts/verify-m0-gates.py --self-test
          python3 scripts/write-evidence-manifest.py --self-test
      - name: Install policy tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-about@0.9.1,cargo-audit@0.22.1,cargo-deny@0.20.2,cargo-hack@0.6.45,typos-cli@1.48.0
      - name: Fetch locked dependencies for offline policy checks
        run: cargo fetch --locked
      - name: Check dependency licenses and sources
        run: cargo deny check
      - name: Check Rust security advisories
        # cargo-audit cannot derive target reachability from Cargo.lock. These
        # time-bounded ignores cover existing Apple-reachable findings plus
        # Dioxus/Wry dependencies that the verifier proves unreachable from the
        # macOS, iOS device, and iOS simulator graphs. The Dioxus diagnostic
        # remains rejected for production.
        run: >-
          cargo audit
          --deny warnings
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2024-0411
          --ignore RUSTSEC-2024-0412
          --ignore RUSTSEC-2024-0413
          --ignore RUSTSEC-2024-0414
          --ignore RUSTSEC-2024-0415
          --ignore RUSTSEC-2024-0416
          --ignore RUSTSEC-2024-0418
          --ignore RUSTSEC-2024-0419
          --ignore RUSTSEC-2024-0420
          --ignore RUSTSEC-2024-0429
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0057
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2026-0097
          --ignore RUSTSEC-2026-0192
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
          --ignore RUSTSEC-2026-0206
      - name: Enforce temporary Slint advisory review deadline
        shell: bash
        run: '[[ "$(date -u +%F)" < "2026-08-15" ]]'
      - name: Enforce temporary Dioxus advisory review deadline
        shell: bash
        run: '[[ "$(date -u +%F)" < "2026-08-15" ]]'
      - name: Check feature combinations
        run: cargo hack check --locked --workspace --feature-powerset --all-targets
      - name: Check spelling
        run: typos
      - name: Check pull request DCO sign-offs
        if: github.event_name == 'pull_request'
        run: >-
          cargo run --locked --package xtask -- dco
          "${{ github.event.pull_request.base.sha }}"
          "${{ github.event.pull_request.head.sha }}"
      - name: Check main push DCO sign-offs
        if: github.event_name == 'push'
        run: >-
          cargo run --locked --package xtask -- dco
          "${{ github.event.before }}"
          "${{ github.sha }}"
