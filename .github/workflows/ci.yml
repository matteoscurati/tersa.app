name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  apple-bootstrap:
    name: Apple bootstrap
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Verify Xcode 26
        run: xcodebuild -version | grep -Fx 'Xcode 26.6'
      - name: Install XcodeGen 2.45.4
        env:
          XCODEGEN_SHA256: 090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef
        run: |
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/xcodegen.zip" \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip
          echo "$XCODEGEN_SHA256  $RUNNER_TEMP/xcodegen.zip" | shasum -a 256 --check
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/xcodegen/bin/xcodegen" --version | grep -Fx 'Version: 2.45.4'
      - name: Generate Apple project
        run: xcodegen generate --spec apple/project.yml --project apple
      - name: Build unsigned macOS debug application
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaMac
          -configuration Debug -destination 'platform=macOS,arch=arm64'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO build
      - name: Build unsigned iOS simulator debug application
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaIOS
          -configuration Debug -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO build
      - name: Build unsigned iOS device debug application
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaIOS
          -configuration Debug -sdk iphoneos
          -destination 'generic/platform=iOS'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO build
      - name: Archive unsigned macOS debug application
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaMac
          -configuration Debug -destination 'generic/platform=macOS'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO archive
          -archivePath apple/build/TersaMac.xcarchive
      - name: Archive unsigned iOS debug application
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaIOS
          -configuration Debug -sdk iphoneos
          -destination 'generic/platform=iOS'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO archive
          -archivePath apple/build/TersaIOS.xcarchive
      - name: Verify archived Rust bridge symbols
        run: |
          nm -gU apple/build/TersaMac.xcarchive/Products/Applications/Tersa.app/Contents/MacOS/Tersa \
            | grep -F '_tersa_apple_bridge_version'
          nm -gU apple/build/TersaIOS.xcarchive/Products/Applications/Tersa.app/Tersa \
            | grep -F '_tersa_apple_bridge_version'
      - name: Build and archive unsigned macOS Slint spike
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaSlintMac
          -configuration Release -destination 'generic/platform=macOS'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO archive
          -archivePath apple/build/TersaSlintMac.xcarchive
      - name: Build unsigned iOS simulator Slint spike
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaSlintIOS
          -configuration Debug -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO build
      - name: Archive unsigned iOS Slint spike
        run: >-
          xcodebuild -project apple/Tersa.xcodeproj -scheme TersaSlintIOS
          -configuration Release -sdk iphoneos -destination 'generic/platform=iOS'
          -derivedDataPath apple/build/DerivedData CODE_SIGNING_ALLOWED=NO archive
          -archivePath apple/build/TersaSlintIOS.xcarchive
      - name: Verify and capture Slint spike evidence
        run: sh apple/scripts/capture-slint-evidence.sh
      - name: Upload Slint spike screenshots and metrics
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: slint-spike-evidence
          path: apple/build/slint-evidence
          if-no-files-found: error

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - name: Run baseline verification
        run: cargo run --locked --package xtask -- verify

  policy:
    name: Policy and supply chain
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - name: Install policy tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-about@0.9.1,cargo-audit@0.22.1,cargo-deny@0.20.2,cargo-hack@0.6.45,typos-cli@1.48.0
      - name: Fetch locked dependencies for offline policy checks
        run: cargo fetch --locked
      - name: Check target-specific third-party notices
        run: sh apple/scripts/generate-third-party-notices.sh --check
      - name: Check dependency licenses and sources
        run: cargo deny check
      - name: Check Rust security advisories
        # cargo-audit cannot derive target reachability from Cargo.lock. These
        # time-bounded ignores cover three Apple-reachable unmaintained notices,
        # one build-time compiler notice, and two non-Apple Wayland findings.
        run: >-
          cargo audit
          --deny warnings
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2026-0192
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
          --ignore RUSTSEC-2026-0206
      - name: Enforce temporary Slint advisory review deadline
        shell: bash
        run: '[[ "$(date -u +%F)" < "2026-08-15" ]]'
      - name: Check feature combinations
        run: cargo hack check --locked --workspace --feature-powerset --all-targets
      - name: Check spelling
        run: typos
      - name: Check pull request DCO sign-offs
        if: github.event_name == 'pull_request'
        run: >-
          cargo run --locked --package xtask -- dco
          "${{ github.event.pull_request.base.sha }}"
          "${{ github.event.pull_request.head.sha }}"
      - name: Check main push DCO sign-offs
        if: github.event_name == 'push'
        run: >-
          cargo run --locked --package xtask -- dco
          "${{ github.event.before }}"
          "${{ github.sha }}"
