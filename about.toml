accepted = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "LicenseRef-Slint-Royalty-free-2.0",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

ignore-build-dependencies = true
ignore-dev-dependencies = true

[private]
ignore = true

# Slint publishes the selected royalty-free terms inside every package, but its
# Cargo license expression also contains two unselected alternatives. These
# checksum-bound clarifications record this repository's explicit election and
# make cargo-about include the exact selected text.
[i-slint-backend-selector.clarify]
license = "LicenseRef-Slint-Royalty-free-2.0"
[[i-slint-backend-selector.clarify.files]]
path = "LICENSES/LicenseRef-Slint-Royalty-free-2.0.md"
checksum = "5167f5056e850419106ab6265efbdca7cba4d99c849d1445ca0bbf6a1e2315fe"

