name: Tersa
options:
  bundleIdPrefix: app.tersa
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "26.0"
settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "NO"
    SWIFT_VERSION: "6.0"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    DEVELOPMENT_TEAM: ""
    TERSA_OAUTH_CLIENT_ID: UNCONFIGURED
    TERSA_OAUTH_REDIRECT_SCHEME: app.tersa.oauth.UNCONFIGURED
targets:
  TersaMac:
    type: application
    platform: macOS
    sources:
      - path: macos
      - path: licenses/THIRD_PARTY_NOTICES-bridge-macos.txt
        buildPhase: resources
    info:
      path: macos/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.productivity
        TersaOAuthClientID: "$(TERSA_OAUTH_CLIENT_ID)"
    entitlements:
      path: macos/TersaMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.mac
        PRODUCT_NAME: Tersa
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: macos/TersaMac.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: macos/TersaMac-Bridging-Header.h
        # Cargo and rustup read their compiler sysroot outside SRCROOT. Keep
        # this exception scoped to the target that invokes the locked script.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        OTHER_LDFLAGS:
          - "$(SRCROOT)/build/rust/$(PLATFORM_NAME)/$(CONFIGURATION)/libtersa_apple_bridge.a"
    preBuildScripts:
      - name: Build Rust static library
        basedOnDependencyAnalysis: false
        script: 'sh "${SRCROOT}/scripts/build-rust-staticlib.sh" macos "${CONFIGURATION}"'
    scheme:
      testTargets: []
  TersaIOS:
    type: application
    platform: iOS
    sources:
      - path: ios
      - path: licenses/THIRD_PARTY_NOTICES-bridge-ios.txt
        buildPhase: resources
    info:
      path: ios/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "$(TERSA_OAUTH_REDIRECT_SCHEME)"
        TersaOAuthClientID: "$(TERSA_OAUTH_CLIENT_ID)"
        TersaOAuthRedirectScheme: "$(TERSA_OAUTH_REDIRECT_SCHEME)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: ios/TersaIOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.ios
        PRODUCT_NAME: Tersa
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ios/TersaIOS.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: ios/TersaIOS-Bridging-Header.h
        # Cargo and rustup read their compiler sysroot outside SRCROOT. Keep
        # this exception scoped to the target that invokes the locked script.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        OTHER_LDFLAGS:
          - "$(SRCROOT)/build/rust/$(PLATFORM_NAME)/$(CONFIGURATION)/libtersa_apple_bridge.a"
    preBuildScripts:
      - name: Build Rust static library
        basedOnDependencyAnalysis: false
        script: 'sh "${SRCROOT}/scripts/build-rust-staticlib.sh" ios "${CONFIGURATION}"'
    scheme:
      testTargets: []
  TersaSlintMac:
    type: application
    platform: macOS
    sources:
      - path: licenses/THIRD_PARTY_NOTICES-macos.txt
        buildPhase: resources
    info:
      path: slint-macos/Info.plist
      properties:
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.slint-spike.mac
        PRODUCT_NAME: Tersa Slint Spike
        EXECUTABLE_NAME: tersa-slint-spike
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        # Cargo and rustup read their compiler sysroot outside SRCROOT. This
        # exception is restricted to the target that packages the Rust binary.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    postCompileScripts:
      - name: Build Rust Slint executable
        basedOnDependencyAnalysis: false
        script: 'sh "${SRCROOT}/scripts/build-slint-executable.sh" macos "${CONFIGURATION}"'
    scheme:
      testTargets: []
  TersaSlintIOS:
    type: application
    platform: iOS
    sources:
      - path: licenses/THIRD_PARTY_NOTICES-ios.txt
        buildPhase: resources
    info:
      path: slint-ios/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.slint-spike.ios
        PRODUCT_NAME: Tersa Slint Spike
        EXECUTABLE_NAME: tersa-slint-spike
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Cargo and rustup read their compiler sysroot outside SRCROOT. This
        # exception is restricted to the target that packages the Rust binary.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    postCompileScripts:
      - name: Build Rust Slint executable
        basedOnDependencyAnalysis: false
        script: 'sh "${SRCROOT}/scripts/build-slint-executable.sh" ios "${CONFIGURATION}"'
    scheme:
      testTargets: []
  TersaDioxusMac:
    type: application
    platform: macOS
    sources:
      - path: licenses/THIRD_PARTY_NOTICES-dioxus-macos.txt
        buildPhase: resources
    info:
      path: dioxus-macos/Info.plist
      properties:
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.dioxus-spike.mac
        PRODUCT_NAME: Tersa Dioxus Spike
        EXECUTABLE_NAME: tersa-dioxus-spike
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        # Cargo and rustup read their compiler sysroot outside SRCROOT. This
        # exception is restricted to the target that packages the Rust binary.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    postCompileScripts:
      - name: Build Rust Dioxus executable
        basedOnDependencyAnalysis: false
        script: 'sh "${SRCROOT}/scripts/build-dioxus-executable.sh" macos "${CONFIGURATION}"'
    scheme:
      testTargets: []
  TersaDioxusIOS:
    type: application
    platform: iOS
    sources:
      - path: licenses/THIRD_PARTY_NOTICES-dioxus-ios.txt
        buildPhase: resources
    info:
      path: dioxus-ios/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.dioxus-spike.ios
        PRODUCT_NAME: Tersa Dioxus Spike
        EXECUTABLE_NAME: tersa-dioxus-spike
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Cargo and rustup read their compiler sysroot outside SRCROOT. This
        # exception is restricted to the target that packages the Rust binary.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    postCompileScripts:
      - name: Build Rust Dioxus executable
        basedOnDependencyAnalysis: false
        script: 'sh "${SRCROOT}/scripts/build-dioxus-executable.sh" ios "${CONFIGURATION}"'
    scheme:
      testTargets: []
  TersaMimeMac:
    type: application
    platform: macOS
    sources:
      - path: mime-common
      - path: mime-macos
      - path: licenses/THIRD_PARTY_NOTICES-mime-macos.txt
        buildPhase: resources
    info:
      path: mime-macos/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHighResolutionCapable: true
    entitlements:
      path: mime-macos/TersaMimeMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.mime-spike.mac
        PRODUCT_NAME: Tersa MIME Spike
        EXECUTABLE_NAME: tersa-mime-native-spike
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: mime-macos/TersaMimeMac.entitlements
    scheme:
      testTargets: []
  TersaMimeIOS:
    type: application
    platform: iOS
    sources:
      - path: mime-common
      - path: mime-ios
      - path: licenses/THIRD_PARTY_NOTICES-mime-ios.txt
        buildPhase: resources
    info:
      path: mime-ios/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tersa.mime-spike.ios
        PRODUCT_NAME: Tersa MIME Spike
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
